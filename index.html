<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crave Norwich | Smash Burgers, Fried Chicken & Wings</title>
<meta name="description" content="Crave Norwich serves premium smash burgers, buttermilk fried chicken and bold wings made fresh to order. Enjoy the ultimate burger experience in Norwich.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400..700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-orange: #d97706; 
            --brand-cream: #cdb694;
            --deep-brown: #2d241e;    
            --soft-white: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: white;
            color: var(--deep-brown);
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1, h2, h3, .brand-font {
            font-family: 'El Messiri', sans-serif;
            font-weight: 700;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        #header-section {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10000;
            transition: background 0.4s ease;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--soft-white); }
        ::-webkit-scrollbar-thumb { background: var(--brand-cream); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-orange); }
    </style>
</head>
<body>

    <header id="header-section"></header>

    <main>
        <section id="hero-section"></section>
        <section id="services-section" class="reveal"></section>
        <section id="food-gallery-section" class="reveal"></section>
        <section id="about-section" class="reveal"></section>
        <section id="blog-section" class="reveal"></section>
        <section id="faq-section" class="reveal"></section>
        <section id="locations-section" class="reveal"></section>
        <section id="social-feed-section" class="reveal"></section>
        
        <!-- <section id="packages-section" class="reveal"></section> -->
    </main>

    <footer id="footer-section"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        async function loadModularSection(id, fileName) {
            const target = document.getElementById(id);
            try {
                const response = await fetch(`sections/${fileName}`);
                if (!response.ok) throw new Error(`File sections/${fileName} not found.`);
                
                const htmlContent = await response.text();
                target.innerHTML = htmlContent;

                // Execute scripts inside the newly loaded content
                const scripts = target.querySelectorAll("script");
                scripts.forEach(oldScript => {
                    const newScript = document.createElement("script");
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.text = oldScript.text;
                    }
                    document.body.appendChild(newScript);
                });

                // Header specific logic
                if (id === 'header-section') {
                    target.classList.add('header-scrolled');
                }

                refreshObserver();

            } catch (error) {
                console.error("Error loading section:", error);
                target.innerHTML = `<div class='alert alert-danger m-5'>Error loading component: ${fileName}.</div>`;
            }
        }

        const observerOptions = { threshold: 0.15 };
        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        function refreshObserver() {
            document.querySelectorAll('.reveal').forEach(el => scrollObserver.observe(el));
        }

        window.addEventListener('DOMContentLoaded', () => {
            const sections = [
                ['header-section', 'header.html'],
                ['hero-section', 'hero.html'],
                ['services-section', 'services.html'],
                ['food-gallery-section', 'food-gallery.html'],
                ['about-section', 'about.html'],
                ['blog-section', 'blog.html'],
                ['faq-section', 'faq.html'],
                ['locations-section', 'locations.html'],
                ['social-feed-section', 'social.html'],
                ['packages-section', 'packages.html'], // Added packages here
                ['footer-section', 'footer.html']
            ];

            sections.forEach(([id, file]) => loadModularSection(id, file));
        });
    </script>
</body>
</html>
