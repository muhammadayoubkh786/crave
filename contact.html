<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Crave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400..700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --brand-orange: #d97706; 
            --deep-brown: #da905b; 
            --brand-cream: #cdb694;
        }
        
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: var(--deep-brown); margin: 0; overflow-x: hidden; }
        
        /* Typography */
        h1, h2, h3, h5, .form-label, .btn-submit { font-family: 'El Messiri', sans-serif; font-weight: 700; }

        /* Animation System */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.9s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Global Header Fix --- */
        #header-section { width: 100%; z-index: 2000; }

        /* Contact Hero */
        .contact-hero {
            background: var(--deep-brown);
            color: white;
            padding: 140px 0 160px; /* Increased top padding for header clearance */
            text-align: center;
            border-bottom: 8px solid var(--brand-orange);
            margin-top: -1px;
        }
        .contact-hero h1 {
            font-size: clamp(3.5rem, 8vw, 6rem);
            line-height: 0.8;
            margin: 0;
            text-transform: uppercase;
        }

        /* Form Card Styling */
        .contact-card {
            background: #fff;
            border: none;
            padding: 60px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.12);
            margin-top: -100px; /* Overlap effect */
            position: relative;
            z-index: 10;
        }

        .form-label {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--deep-brown);
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .form-control, .form-select {
            border-radius: 0;
            border: 2px solid #f1f1f1;
            padding: 15px;
            font-family: 'Inter';
            background: #fafafa;
            transition: 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--brand-orange);
            background: #fff;
            box-shadow: none;
        }

        .btn-submit {
            background: var(--brand-orange);
            color: white;
            border: none;
            border-radius: 0;
            padding: 22px;
            font-size: 1.1rem;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.4s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--deep-brown);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Info Boxes using Brand Cream */
        .info-box {
            padding: 30px;
            border-left: 6px solid var(--brand-orange);
            background: var(--brand-cream);
            margin-bottom: 25px;
            color: white;
        }

        .info-box h5 { font-size: 1rem; letter-spacing: 2px; margin-bottom: 10px; color: var(--deep-brown); }
        .info-box p { margin: 0; color: #fff; font-size: 1.05rem; font-weight: 400; line-height: 1.4; }

        .contact-subtitle { font-family: 'El Messiri'; font-size: 2.8rem; line-height: 1; color: var(--deep-brown); }

        @media (max-width: 991px) {
            .contact-hero { padding-top: 160px; }
            .contact-card { padding: 40px 25px; margin-top: -80px; }
            .contact-subtitle { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div id="header-section"></div>
    
    <main>
        <section class="contact-hero">
            <div class="container reveal">
                <p class="text-uppercase fw-bold mb-3" style="color: var(--brand-orange); letter-spacing: 5px; font-size: 0.9rem;">Join the family</p>
                <h1>LET'S <span style="color: var(--brand-cream);">CHAT.</span></h1>
            </div>
        </section>

        <section class="pb-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-11">
                        <div class="contact-card reveal">
                            <div class="row g-5">
                                <div class="col-md-5">
                                    <h2 class="contact-subtitle mb-4">Questions about the smash?</h2>
                                    <p class="text-muted mb-5">Whether it's dietary info, franchise details, or just some love for the sauce, our team is ready.</p>
                                    
                                    <div class="info-box reveal" style="transition-delay: 0.1s;">
                                        <h5>VISIT US</h5>
                                        <p class="text-black">The Terrace, Norwich City Centre<br>NR1 3RG</p>
                                    </div>
                                    <div class="info-box reveal" style="transition-delay: 0.2s;">
                                        <h5>CALL US</h5>
                                        <p class="text-black">0 7446 946249</p>
                                    </div>
                                    <div class="info-box reveal" style="transition-delay: 0.3s;">
                                        <h5>EMAIL US</h5>
                                        <p class="text-black">hello@craveburgers.co.uk</p>
                                    </div>
                                </div>

                                <div class="col-md-7">
                                    <form id="craveContactForm">
                                        <div class="row g-4">
                                            <div class="col-md-6">
                                                <label class="form-label">Full Name</label>
                                                <input type="text" class="form-control" placeholder="Ayoub..." required>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label">Email Address</label>
                                                <input type="email" class="form-control" placeholder="name@email.com" required>
                                            </div>
                                            <div class="col-md-12">
                                                <label class="form-label">Subject</label>
                                                <select class="form-select">
                                                    <option selected>General Inquiry</option>
                                                    <option>Feedback & Reviews</option>
                                                    <option>Franchise Opportunity</option>
                                                    <option>Catering Request</option>
                                                </select>
                                            </div>
                                            <div class="col-md-12">
                                                <label class="form-label">Message</label>
                                                <textarea class="form-control" rows="6" placeholder="What's on your mind?"></textarea>
                                            </div>
                                            <div class="col-md-12">
                                                <button type="submit" class="btn-submit">SEND TO THE KITCHEN</button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-section"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Scroll Reveal Logic
        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        // Component Loader
        async function loadShared(id, file) {
            const container = document.getElementById(id);
            if (!container) return;
            try {
                const res = await fetch(`sections/${file}`);
                container.innerHTML = await res.text();
                
                container.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement("script");
                    newScript.text = oldScript.text;
                    document.body.appendChild(newScript);
                });
            } catch (err) { console.error("Error loading:", file); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadShared('header-section', 'header.html');
            loadShared('footer-section', 'footer.html');
            document.querySelectorAll('.reveal').forEach(el => scrollObserver.observe(el));
        });
    </script>
</body>
</html>
