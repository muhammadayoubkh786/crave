<section id="hero" class="vh-100 d-flex align-items-center overflow-hidden position-relative">
    <style>
        #hero {
            --hero-h1: clamp(2.2rem, 7vw, 5rem); 
            --hero-p: clamp(0.95rem, 2vw, 1.15rem);
            --brand-cream: #cdb694; 
            background: #000;
            padding-top: 100px;
        }

        /* 1. BACKGROUND & OVERLAY */
        .video-background {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw; 
            min-height: 100vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.1);
            opacity: 0.5; 
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }

        /* 2. MODERN REVEAL ANIMATIONS (KEYFRAMES) */
        @keyframes revealUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .hero-content {
            position: relative;
            z-index: 5;
            width: 100%;
            text-align: center; /* Center all text content */
        }

        .hero-subtitle {
            color: var(--brand-orange, #ff5722);
            letter-spacing: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 1rem;
            animation: revealUp 1s cubic-bezier(0.2, 1, 0.2, 1) forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }

        .hero-title {
            font-family: 'El Messiri', sans-serif;
            font-size: var(--hero-h1);
            line-height: 1.1;
            font-weight: 700;
            color: #fff;
            margin: 0;
            animation: revealUp 1.2s cubic-bezier(0.2, 1, 0.2, 1) forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }

        .text-outline {
            color: transparent;
            -webkit-text-stroke: 1.5px var(--brand-cream); 
            font-style: italic;
        }

        .hero-description {
            max-width: 1090px;
            font-size: var(--hero-p);
            line-height: 1.6; /* Tightened slightly to save space */
            color: rgba(255,255,255,0.8);
            margin-top: 1rem;
            margin-bottom: 2rem;
            animation: revealUp 1.2s cubic-bezier(0.2, 1, 0.2, 1) forwards;
            animation-delay: 0.8s;
            opacity: 0;
            margin-left: auto; /* Center the description block */
            margin-right: auto; /* Center the description block */
        }

        .hero-btn-group {
            animation: revealUp 1.2s cubic-bezier(0.2, 1, 0.2, 1) forwards;
            animation-delay: 1.1s;
            opacity: 0;
            justify-content: center !important; /* Center the buttons */
        }

        /* 3. BUTTONS */
        .btn-luxury-main {
            background: var(--brand-orange, #ff5722);
            color: #fff;
            border: none;
            padding: 14px 35px; /* Slightly smaller padding to prevent overflow */
            font-family: 'El Messiri', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.4s;
            border-radius: 0;
        }

        .btn-luxury-main:hover {
            background: #fff;
            color: var(--brand-orange);
            transform: translateY(-5px);
        }

        .btn-luxury-outline {
            background: transparent;
            color: #fff;
            border: 2px solid var(--brand-cream);
            padding: 12px 35px;
            font-family: 'El Messiri', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.4s;
            border-radius: 0;
        }

        .btn-luxury-outline:hover {
            background: var(--brand-cream);
            color: #2d241e;
            transform: translateY(-5px);
        }

        @media (max-width: 768px) {
            #hero { text-align: center; padding-top: 140px; }
            .hero-description { margin-left: auto; margin-right: auto; }
            .hero-btn-group { justify-content: center; }

            .hero-title{
                margin-top: -90px;
            }
        }

        /* Center the row content */
        .row {
            justify-content: center;
        }
        
        .col-lg-12 {
            text-align: center;
        }
    </style>

    <div class="video-background">
        <iframe 
            src="https://www.youtube.com/embed/xPPLbEFbCAo?autoplay=1&mute=1&loop=1&playlist=xPPLbEFbCAo&controls=0&showinfo=0&rel=0&iv_load_policy=3&enablejsapi=1" 
            frameborder="0" 
            allow="autoplay; encrypted-media">
        </iframe>
        <div class="hero-overlay"></div>
    </div>

    <div class="container hero-content">
        <div class="row justify-content-center">
            <div class="col-lg-12 text-center">
                <!-- <span class="hero-subtitle">Premium Kitchen</span> -->
                
                <h1 class="hero-title">
                    Smash Burgers, Chicken & <br>
                 <span class="text-outline">Wings in Norwich</span>
                </h1>

                <p class="hero-description">
                    Juicy British beef smash burgers, crispy buttermilk chicken, and wings. Freshly prepared in Norwich, seriously satisfying.
                </p>

                <div class="d-flex flex-wrap gap-3 hero-btn-group justify-content-center">
                    <button class="btn-luxury-main">VIEW MENU</button>
                    <button class="btn-luxury-outline">ORDER ONLINE</button>
                </div>
            </div>
        </div>
    </div>
</section>
