<section id="social" class="py-lg-10 py-5 overflow-hidden" style="background: #0f0f0f; color: #fff; position: relative;">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;700&family=Playfair+Display:wght@700;900&display=swap');

        :root { 
            --brand-orange: #d97706; 
        }

        .py-lg-10 { padding: 100px 0; }

        /* --- THE SOCIAL SNAP REVEAL --- */
        .insta-reveal {
            opacity: 0;
            filter: blur(15px);
            transform: translateY(60px);
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .insta-reveal.visible {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0);
        }

        /* Responsive Grid */
        .insta-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
            padding: 40px 0;
            position: relative;
            z-index: 2;
        }

        @media (min-width: 992px) {
            .insta-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 30px;
            }
        }

        /* Premium Box Style */
        .insta-box {
            position: relative;
            background: #1a1a1a;
            padding: 10px;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Zig-Zag layout for Desktop */
        @media (min-width: 992px) {
            .insta-box:nth-child(even) { margin-top: 40px; }
            .insta-box:nth-child(odd) { margin-top: -40px; }
        }

        .insta-box:hover {
            transform: scale(1.05) translateY(-5px) !important;
            z-index: 10;
            background: #252525;
            border-color: var(--brand-orange);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .insta-box img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            filter: brightness(0.6) sepia(0.2);
            transition: 0.6s ease;
        }

        .insta-box:hover img { 
            filter: brightness(1) sepia(0); 
        }

        /* Background Giant Text */
        .social-footer-text {
            font-family: 'Playfair Display', serif;
            font-size: 20vw; 
            font-weight: 900;
            color: var(--brand-orange);
            opacity: 0.04;
            position: absolute;
            bottom: -5vw;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
        }

        .social-tag {
            background: var(--brand-orange);
            color: white;
            padding: 6px 18px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 3px;
            display: inline-block;
            margin-bottom: 20px;
            font-family: 'El Messiri', sans-serif;
        }

        .g{
            font-family: 'Playfair Display', serif !important;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .modern-font {
            font-family: 'El Messiri', sans-serif !important;
        }
    </style>

    <div class="container position-relative py-5">
        <div class="text-center mb-5 insta-reveal" id="social-header">
            <span class="social-tag">INSTAGRAM</span>
            <h2 class="   display-3 mb-3">HOT OFF THE PASS</h2>
            <p class="modern-font text-white-50" style="font-size: 1.2rem;">
                Follow the flame <strong class="text-white">@craveandpepperldn</strong>
            </p>
        </div>

        <div class="insta-grid">
            <div class="insta-box insta-reveal" data-delay="0.1">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600" alt="Burger">
            </div>
            <div class="insta-box insta-reveal" data-delay="0.2">
                <img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=600" alt="Wings">
            </div>
            <div class="insta-box insta-reveal" data-delay="0.3">
                <img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=600" alt="Steak">
            </div>
            <div class="insta-box insta-reveal" data-delay="0.4">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600" alt="Pizza">
            </div>
        </div>
    </div>

    <div class="social-footer-text">CRAVE</div>

    <script>
        const socialObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    const delay = entry.target.getAttribute('data-delay') || 0;
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, delay * 1000);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.insta-reveal').forEach(el => socialObserver.observe(el));
    </script>
</section>
