<section id="locations" class="py-5 bg-white overflow-hidden">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=El+Messiri:wght@700&family=Inter:wght@400;700;900&display=swap');

        :root {
            --brand-orange: #d97706;
            --deep-brown: #2d241e;
            --brand-cream: #cdb694;
        }

        #locations { padding: 100px 0 !important; }

        /* --- THE BOX MOTION (Simplified for center focus) --- */
        @keyframes boxFlyInBottom {
            0% { opacity: 0; transform: translateY(80px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- THE TEXT MOTION --- */
        @keyframes textSlideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .box-motion-bottom { 
            animation: boxFlyInBottom 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        .loc-grid-card div, .loc-grid-card a, .loc-grid-card h3 {
            opacity: 0;
            animation: textSlideUp 0.8s ease-out forwards;
            animation-delay: 0.5s; 
        }

        /* --- CENTRAL CARD DESIGN --- */
        .loc-grid-card {
            background: #fff;
            border: 1px solid #eee;
            padding: 60px 40px;
            max-width: 550px;
            margin: 0 auto; /* Perfectly centered */
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center; /* Center content horizontally */
            text-align: center;
            transition: all 0.4s ease;
            opacity: 0; 
        }

        .loc-grid-card:hover {
            background: var(--deep-brown);
            transform: translateY(-10px);
            box-shadow: 0 40px 80px rgba(45, 36, 30, 0.15);
        }

        .loc-title {
            font-family: 'El Messiri', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--deep-brown);
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .loc-grid-card:hover .loc-title { color: var(--brand-cream); }

        .loc-address {
            font-family: 'Inter', sans-serif;
            color: #6c757d;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .loc-grid-card:hover .loc-address { color: #fff; }

        /* Centered Badge */
        .badge-loc {
            background: var(--brand-orange);
            color: white;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 0.75rem;
            padding: 8px 20px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%); /* Hangs over the top edge in center */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .loc-link {
            font-family: 'El Messiri', sans-serif;
            color: var(--brand-orange);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 40px;
            display: inline-block;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .loc-grid-card:hover .loc-link { 
            color: #fff; 
            border-bottom-color: #fff;
        }

        /* Header Centering */
        .loc-section-title {
            font-family: 'El Messiri', sans-serif;
            font-size: clamp(3rem, 8vw, 4.5rem);
            color: var(--deep-brown);
            margin-bottom: 10px;
        }

        .loc-subtitle {
            color: var(--brand-orange);
            font-weight: 700;
          
            letter-spacing: 4px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        @media (max-width: 768px) {
            .loc-title { font-size: 2.5rem; }
            .loc-grid-card { padding: 50px 25px; margin: 0 15px; }
        }
    </style>

    <div class="container">
        <div class="row mb-5 justify-content-center box-motion-bottom">
            <div class="col-lg-12 text-center">
                <h2 class="loc-section-title">FIND US</h2>
                <p class="loc-subtitle mb-2">NORWICH'S FAVOURITE BURGER SPOT</p>
                <div style="height: 3px; width: 60px; background: var(--brand-cream); display: inline-block;"></div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="loc-grid-card box-motion-bottom">
                    <span class="badge-loc">OPEN NOW</span>
                    <div>
                        <h3 class="loc-title">Norwich</h3>
                        <p class="loc-address">
                            The Terrace, NR1 3EB<br>
                            Norwich, United Kingdom
                        </p>
                    </div>
                    <a href="#" class="loc-link text-uppercase">ORDER DELIVERY →</a>
                </div>
            </div>
        </div>
    </div>
</section>
